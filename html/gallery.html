<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
  <h1>My Gallery</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </nav>
</header>

<main>

<h2>My Images</h2>

<div class="gallery">

  <div class="card">
    <img src="../images/code.jpg" onclick="openImg(this)">
    <p>Code Setup</p>
  </div>

  <div class="card">
    <img src="../images/coding.jpg" onclick="openImg(this)">
    <p>Coding</p>
  </div>

  <div class="card">
    <img src="../images/desktop.jpg" onclick="openImg(this)">
    <p>Workspace</p>
  </div>

  <div class="card">
    <img src="../images/error.jpg" onclick="openImg(this)">
    <p>Debugging</p>
  </div>

</div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<footer>
  <p>My Portfolio</p>
</footer>

<script>
function openImg(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

function closeImg() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
