<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
  <h1>🖼️ My Gallery</h1>

  <nav>
    <a href="index.html">🏠 Home</a> |
    <a href="about.html">👤 About</a> |
    <a href="contact.html">✉️ Contact</a> |
    <a href="gallery.html">🖼️ Gallery</a>

    <button onclick="document.body.classList.toggle('dark')">🌙</button>
  </nav>
</header>

<hr>

<main>

<section>
  <h2>My Work & Photos</h2>
  <p>Click on any image to view it in full size</p>
</section>

<br>

<section class="gallery">

  <div class="card">
    <img src="../images/code.jpg" width="200" onclick="openLightbox(0)">
  </div>

  <div class="card">
    <img src="../images/coding.jpg" width="200" onclick="openLightbox(1)">
  </div>

  <div class="card">
    <img src="../images/desktop.jpg" width="200" onclick="openLightbox(2)">
  </div>

  <div class="card">
    <img src="../images/error.jpg" width="200" onclick="openLightbox(3)">
  </div>

  <div class="card">
    <img src="../images/project.jpg" width="200" onclick="openLightbox(4)">
  </div>

  <div class="card">
    <img src="../images/workspace.jpg" width="200" onclick="openLightbox(5)">
  </div>

  <div class="card">
    <img src="../images/swim.jpg" width="200" onclick="openLightbox(6)">
  </div>

  <div class="card">
    <img src="../images/beach.jpg" width="200" onclick="openLightbox(7)">
  </div>

</section>

</main>

<hr>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" width="400">

  <div>
    <button onclick="prev(event)">◀</button>
    <button onclick="next(event)">▶</button>
    <button onclick="closeLightbox()">✖</button>
  </div>
</div>

<footer>
  <p>© 2026 My Portfolio</p>
</footer>

<script>
let images = [
  "../images/code.jpg",
  "../images/coding.jpg",
  "../images/desktop.jpg",
  "../images/error.jpg",
  "../images/project.jpg",
  "../images/workspace.jpg",
  "../images/swim.jpg",
  "../images/beach.jpg"
];

let current = 0;

function openLightbox(i) {
  current = i;
  document.getElementById("lightbox").style.display = "block";
  document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function next(e) {
  e.stopPropagation();
  current = (current + 1) % images.length;
  document.getElementById("lightbox-img").src = images[current];
}

function prev(e) {
  e.stopPropagation();
  current = (current - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[current];
}
</script>

</body>
</html>
