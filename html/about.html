<!DOCTYPE html>
<html>
<head>
  <title>About</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
  <h1>About Me</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>

    <button onclick="toggleDark()">🌙</button>
  </nav>
</header>

<main>

<h2>About Me</h2>
<p>I am learning web development.</p>

<div class="about-images">
  <img src="../images/workspace.jpg" onclick="openLightbox(0)">
  <img src="../images/code.jpg" onclick="openLightbox(1)">
</div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">

  <div class="lb-controls">
    <button onclick="prev(event)">◀</button>
    <button onclick="next(event)">▶</button>
    <button onclick="closeLightbox()">✖</button>
  </div>
</div>

<footer>
  <p>My Portfolio</p>
</footer>

<script>
let images = [
  "../images/workspace.jpg",
  "../images/code.jpg"
];

let current = 0;

function openLightbox(i) {
  current = i;
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = images[current];
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function next(e) {
  e.stopPropagation();
  current++;
  if(current >= images.length) current = 0;
  document.getElementById("lightbox-img").src = images[current];
}

function prev(e) {
  e.stopPropagation();
  current--;
  if(current < 0) current = images.length - 1;
  document.getElementById("lightbox-img").src = images[current];
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
